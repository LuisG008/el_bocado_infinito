<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="icon" type="image/x-icon" href="/assets/img/logon-min-infinito-negro.png" sizes="16x16" />

    <!-- Libreria boostrap -->
    <link rel="stylesheet" href="/lib/node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/lib/node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/lib/node_modules/izitoast/dist/css/iziToast.min.css">

    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>
    <div class="content">
        <header>
            <div class="cont-log">
                <img src="/assets/img/logo.png" class="logo" alt="">
            </div>
        </header>
        <main>
            <div class="div-principal-login">
                <h4 class="text-center mb-4">Iniciar Sesión</h4>
                <form id="formLogin" method="POST" action="/login">

                    <div class="form" >
                        <div>
                            <div class="input-group mb-3">
                                <span class="input-group-text">
                                    <i class="bi bi-person-circle"></i>
                                </span>
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="identificacion" name="identificacion" placeholder="Identificación">
                                    <label for="identificacion">Identificación</label>
                                </div>
                            </div>
        
                            <div class="input-group mb-3">
                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>
                                <div class="form-floating">
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña">
                                    <label for="password">Contraseña</label>
                                </div>
                            </div>
                            
                        </div>
                        <div class="btn-container">
                             <button type="submit" class="btn btn-warning  w-100">Ingresar</button>
                        </div>
                    </div>
                </form>

            </div>
        </main>
    </div>
</body>

<script type="text/javascript" src="/lib/node_modules/jquery/dist/jquery.min.js"></script>
<script type="text/javascript" src="/lib/node_modules/jquery-validation/dist/jquery.validate.min.js"></script>
<script type="text/javascript" src="/lib/node_modules/@pablotheblink/flashyjs/flashy.js"></script>

<script type="text/javascript" src="/views/login/js/login.js"></script>
</html>
